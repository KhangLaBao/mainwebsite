<h1> Latest Boardcast Form My Channel!</h1>
<img src="https://michaelmjd.neocities.org/images/youtube.gif">
<h2>This list show 5 newest video from my channel!!!</h2>

<div id="videoList" style="background:#330000;border:2px solid red;padding:10px;width:420px;">
Loading transmissions from bunker...
</div>

<script>
fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id=UCbQxddlD5tRrF2mgB_Cckjw"))
.then(response => response.json())
.then(data => {

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");

    const entries = xml.getElementsByTagName("entry");

    let html = "<p><b>Latest transmissions:</b></p>";

    for(let i=0; i<5; i++){   // show 5 newest videos
        const title = entries[i].getElementsByTagName("title")[0].textContent;
        const link = entries[i].getElementsByTagName("link")[0].getAttribute("href");

        html += `<p>▶ <a href="${link}" target="_blank">${title}</a></p>`;
    }

    document.getElementById("videoList").innerHTML = html;

});
</script>
